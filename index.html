<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué Cultura Organizacional Eres? - UTEL</title>
    <style>
        :root {
            --primary: #c62828;
            --accent: #43a047;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 780px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #e53935);
            color: white;
            padding: 35px 25px;
            text-align: center;
        }

        .logo {
            max-width: 160px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.15rem;
            margin-top: 8px;
            opacity: 0.95;
        }

        .content {
            padding: 35px 25px;
        }

        .progress {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), #ef5350);
            width: 0%;
            transition: width 0.4s ease;
        }

        #question-text {
            font-size: 1.45rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: #1f2937;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option {
            padding: 18px 22px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.08rem;
            transition: all 0.3s ease;
            line-height: 1.4;
        }

        .option:hover {
            border-color: #1e88e5;
            background: #f0f9ff;
            transform: translateY(-2px);
        }

        .option.selected {
            background: #f0fdf4;
            border-color: var(--accent);
            font-weight: 600;
        }

        .navigation {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        button {
            flex: 1;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        #prev-btn {
            background: #f1f5f9;
            color: #475569;
            border: 2px solid #cbd5e1;
        }

        #next-btn {
            background: var(--primary);
            color: white;
        }

        #next-btn:hover {
            background: #b71c1c;
        }

        /* Resultado */
        .result {
            display: none;
            text-align: center;
            padding: 30px 20px;
        }

        .culture-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 35px 25px;
            margin: 25px 0;
        }

        .emoji {
            font-size: 4.8rem;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 720px;
            }
            h1 {
                font-size: 2.4rem;
            }
            .content {
                padding: 45px 40px;
            }
            .option {
                font-size: 1.15rem;
                padding: 20px 25px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.85rem;
            }
            #question-text {
                font-size: 1.3rem;
            }
            .option {
                font-size: 1.05rem;
                padding: 16px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/UTEL_Universidad.png/800px-UTEL_Universidad.png" 
                 alt="Logo UTEL" class="logo">
            <h1>¿Qué Cultura Organizacional Eres?</h1>
            <p class="subtitle">Empresas Mexicanas Edition 🇲🇽</p>
        </header>

        <div class="content">
            <div class="progress">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <!-- Quiz -->
            <div id="quiz">
                <h2 id="question-text">Pregunta 1 de 5</h2>
                <div class="options" id="options"></div>

                <div class="navigation">
                    <button id="prev-btn" onclick="prevQuestion()">← Anterior</button>
                    <button id="next-btn" onclick="nextQuestion()">Siguiente →</button>
                </div>
            </div>

            <!-- Resultado -->
            <div id="result" class="result">
                <h2>¡Felicidades! Esta es tu cultura:</h2>
                <div id="culture-result" class="culture-card"></div>

                <h3>¿Qué significa esto?</h3>
                <p id="description" style="font-size: 1.1rem; margin: 15px 0 25px;"></p>

                <h3>Beneficios principales:</h3>
                <ul id="benefits" style="text-align: left; max-width: 420px; margin: 0 auto 25px; font-size: 1.08rem;"></ul>

                <h3>Ejemplos de empresas mexicanas:</h3>
                <p id="examples" style="font-weight: bold; color: var(--primary); font-size: 1.25rem;"></p>

                <button onclick="reiniciarJuego()" style="width: 100%; padding: 18px; font-size: 1.15rem;">
                    Realizar el test nuevamente
                </button>
            </div>
        </div>
    </div>

    <script>
        const preguntas = [
            {
                pregunta: "En el trabajo, ¿qué valoras más?",
                opciones: [
                    { texto: "Sentirme parte de una familia y que me apoyen", valor: "familiar" },
                    { texto: "Poder proponer ideas nuevas y creativas", valor: "creativa" },
                    { texto: "Ganar, competir y obtener buenos resultados", valor: "competitiva" },
                    { texto: "Que todo esté bien organizado y con reglas claras", valor: "estructurada" }
                ]
            },
            {
                pregunta: "Cuando hay un problema en la empresa, ¿qué prefieres?",
                opciones: [
                    { texto: "Que todos nos reunamos y lo resolvamos juntos como equipo", valor: "familiar" },
                    { texto: "Probar soluciones nuevas aunque sean arriesgadas", valor: "creativa" },
                    { texto: "Que se tome la decisión que más beneficie las ventas o ganancias", valor: "competitiva" },
                    { texto: "Seguir el procedimiento establecido y respetar la cadena de mando", valor: "estructurada" }
                ]
            },
            {
                pregunta: "¿Cómo te gustaría que sea tu jefe?",
                opciones: [
                    { texto: "Como un líder cercano, que se preocupe por mí", valor: "familiar" },
                    { texto: "Alguien que motive la innovación y las ideas locas", valor: "creativa" },
                    { texto: "Alguien exigente que me impulse a dar lo mejor", valor: "competitiva" },
                    { texto: "Alguien claro que dé instrucciones precisas y justas", valor: "estructurada" }
                ]
            },
            {
                pregunta: "En una empresa ideal, ¿qué es más importante?",
                opciones: [
                    { texto: "La lealtad y el buen ambiente entre compañeros", valor: "familiar" },
                    { texto: "La creatividad y adaptarse rápido a los cambios", valor: "creativa" },
                    { texto: "Ser mejor que la competencia y crecer constantemente", valor: "competitiva" },
                    { texto: "La eficiencia, el orden y el control de procesos", valor: "estructurada" }
                ]
            },
            {
                pregunta: "Cuando hay un cambio grande en la empresa, ¿cómo reaccionas?",
                opciones: [
                    { texto: "Me preocupa si afecta al equipo y las relaciones", valor: "familiar" },
                    { texto: "¡Me emociona! Es una oportunidad para innovar", valor: "creativa" },
                    { texto: "Lo veo como una oportunidad para ganar más mercado", valor: "competitiva" },
                    { texto: "Prefiero que se planee bien y se comunique claramente", valor: "estructurada" }
                ]
            }
        ];

        let respuestas = [];
        let preguntaActual = 0;

        function actualizarProgreso() {
            const porcentaje = ((preguntaActual + 1) / preguntas.length) * 100;
            document.getElementById("progress-bar").style.width = `${porcentaje}%`;
        }

        function mostrarPregunta() {
            document.getElementById("question-text").textContent = `Pregunta ${preguntaActual + 1} de ${preguntas.length}`;

            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";

            preguntas[preguntaActual].opciones.forEach((opcion, index) => {
                const div = document.createElement("div");
                div.className = "option";
                div.textContent = opcion.texto;
                div.onclick = () => seleccionarRespuesta(index);
                optionsDiv.appendChild(div);
            });

            actualizarProgreso();
            actualizarBotones();
        }

        function seleccionarRespuesta(index) {
            respuestas[preguntaActual] = preguntas[preguntaActual].opciones[index].valor;
            document.querySelectorAll(".option").forEach((opt, i) => {
                opt.classList.toggle("selected", i === index);
            });
            actualizarBotones();
        }

        function actualizarBotones() {
            document.getElementById("next-btn").style.display = respuestas[preguntaActual] !== undefined ? "block" : "none";
            document.getElementById("prev-btn").style.display = preguntaActual > 0 ? "block" : "none";
        }

        function nextQuestion() {
            if (respuestas[preguntaActual] !== undefined) {
                preguntaActual++;
                if (preguntaActual < preguntas.length) {
                    mostrarPregunta();
                } else {
                    mostrarResultado();
                }
            }
        }

        function prevQuestion() {
            if (preguntaActual > 0) {
                preguntaActual--;
                mostrarPregunta();
            }
        }

        function calcularCultura() {
            const conteo = { familiar: 0, creativa: 0, competitiva: 0, estructurada: 0 };
            respuestas.forEach(res => conteo[res]++);
            return Object.keys(conteo).reduce((a, b) => conteo[a] > conteo[b] ? a : b);
        }

        function mostrarResultado() {
            document.getElementById("quiz").style.display = "none";
            document.getElementById("result").style.display = "block";

            const tipo = calcularCultura();
            let titulo = "", emoji = "", descripcion = "", beneficios = [], ejemplos = "";

            switch(tipo) {
                case "familiar":
                    titulo = "Cultura Familiar"; emoji = "👨‍👩‍👧‍👦";
                    descripcion = "Es como trabajar en una gran familia. Se valora la confianza, el apoyo mutuo y la lealtad.";
                    beneficios = ["Alta motivación y compromiso", "Baja rotación de personal", "Buen clima laboral"];
                    ejemplos = "Grupo Bimbo, FEMSA (OXXO), Liverpool";
                    break;
                case "creativa":
                    titulo = "Cultura Creativa"; emoji = "💡";
                    descripcion = "Se fomenta la creatividad, las ideas nuevas y la adaptación rápida.";
                    beneficios = ["Alta innovación", "Ambiente dinámico", "Adaptación al cambio"];
                    ejemplos = "Kavak, Clip, Cinépolis";
                    break;
                case "competitiva":
                    titulo = "Cultura Competitiva"; emoji = "🏆";
                    descripcion = "Enfocada en resultados, competencia y alto desempeño.";
                    beneficios = ["Crecimiento rápido", "Alta productividad", "Recompensas por metas"];
                    ejemplos = "América Móvil, Grupo Salinas";
                    break;
                case "estructurada":
                    titulo = "Cultura Estructurada"; emoji = "📋";
                    descripcion = "Todo está bien organizado, con procesos claros y estabilidad.";
                    beneficios = ["Estabilidad laboral", "Eficiencia operativa", "Claridad en roles"];
                    ejemplos = "Banorte, Cemex";
                    break;
            }

            document.getElementById("culture-result").innerHTML = `
                <span class="emoji">${emoji}</span>
                <h2 style="color: var(--primary); margin: 15px 0;">${titulo}</h2>
            `;
            document.getElementById("description").textContent = descripcion;

            const ul = document.getElementById("benefits");
            ul.innerHTML = "";
            beneficios.forEach(b => {
                const li = document.createElement("li");
                li.textContent = "• " + b;
                ul.appendChild(li);
            });

            document.getElementById("examples").textContent = ejemplos;
        }

        function reiniciarJuego() {
            respuestas = [];
            preguntaActual = 0;
            document.getElementById("quiz").style.display = "block";
            document.getElementById("result").style.display = "none";
            mostrarPregunta();
        }

        window.onload = mostrarPregunta;
    </script>
</body>
</html>
